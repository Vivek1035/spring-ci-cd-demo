name: Docker Build -> Push -> Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name : Checkout Code
      uses: actions/checkout@v4
      
    - name : Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin' # See 'Supported distributions' for available options
        java-version: '21'

    - name : Build Jar with Maven
      run : mvn clean package -DskipTests

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Build the Docker image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/spring-boot-ci-demo:latest

    - name : Push Image to Docker Hub
      run: docker push ${{ secrets.DOCKER_USERNAME }}/spring-boot-ci-demo:latest

    - name : SSH and Deploy to EC2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop spring-demo || true
          docker rm spring-demo || true
          docker image
          docker pull ${{ secrets.DOCKER_USERNAME }}/spring-boot-ci-demo:latest
          docker run -d -p 8080:8080 --name spring-demo  ${{ secrets.DOCKER_USERNAME }}/spring-boot-ci-demo:latest
 
    
